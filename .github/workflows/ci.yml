name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qdrant-client httpx python-dotenv numpy scikit-learn

      - name: CLI smoke checks
        run: |
          python misfit_crew.py --help
          python misfit_report_pull.py --help
          python canon_alignment_report.py --help
