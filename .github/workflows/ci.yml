name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install qdrant-client httpx python-dotenv numpy scikit-learn

      - name: CLI smoke checks
        run: |
          set -euo pipefail
          scripts=(misfit_crew.py misfit_report_pull.py canon_alignment_report.py)
          found=0
          for script in "${scripts[@]}"; do
            if [[ -f "$script" ]]; then
              python "$script" --help
              found=1
            fi
          done
          if [[ "$found" -eq 0 ]]; then
            echo "No CLI scripts found; skipping smoke checks."
          fi
